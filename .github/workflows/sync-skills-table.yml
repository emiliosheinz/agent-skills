name: Sync Skills Table

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate Available Skills table
        run: node .github/scripts/sync-skills-table.js

      - name: Commit if changed
        run: |
          git diff --exit-code README.md && echo "No changes." && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update Available Skills table"
          git push
